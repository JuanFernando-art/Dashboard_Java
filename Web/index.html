<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login - Gestor ERP</title>
    <link rel="stylesheet" href="Login/login.css">
</head>
<body class="cadastro-page">
<main class="cadastro-container">
    <section class="cadastro-card">
        <div class="cadastro-header">
            <span class="brand-mark">ERP</span>
            <div>
                <h1>Entrar</h1>
                <p>Acesse sua conta para gerenciar seus empreendimentos.</p>
            </div>
        </div>

        <form id="formLogin" class="cadastro-form">
            <label for="emailLogin">Email</label>
            <input type="email" id="emailLogin" required placeholder="ana@email.com">

            <label for="senhaLogin">Senha</label>
            <input type="password" id="senhaLogin" required placeholder="Digite sua senha">

            <p id="erroLogin" class="form-error"></p>

            <button type="submit" class="btn-save">Entrar</button>
        </form>

        <p class="auth-link">Ainda nao tem conta? <a href="Cadastro/cadastro.html">Criar cadastro</a></p>
    </section>
</main>

<script src="Login/login.js"></script>
</body>
</html>
